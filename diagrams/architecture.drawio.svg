    <rect x="490" y="204" width="180" height="30" rx="5" ry="5" fill="#e1bee7" stroke="#6a1b9a" stroke-width="1"/>
    <text x="580" y="224" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#4a148c" text-anchor="middle">evaluation.py</text>

