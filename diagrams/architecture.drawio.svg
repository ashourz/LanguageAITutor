    <!-- rag.py → SQLite -->
    <line x1="670" y1="182" x2="748" y2="192" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <!-- memory.py → SQLite -->
    <line x1="670" y1="256" x2="748" y2="205" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <!-- llm.py → Ollama -->
    <line x1="670" y1="293" x2="748" y2="293" stroke="#90a4ae" stroke-width="1.5" marker-end="url(#arrowGray)"/>
