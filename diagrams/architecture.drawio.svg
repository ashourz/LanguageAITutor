    <rect x="750" y="268" width="160" height="50" rx="6" ry="6" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="830" y="289" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#1b5e20" text-anchor="middle">Ollama</text>
    <text x="830" y="307" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="10" fill="#2e7d32" text-anchor="middle">qwen2.5:14b</text>

