    <text x="580" y="298" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#4a148c" text-anchor="middle">llm.py</text>

    <rect x="490" y="315" width="180" height="30" rx="5" ry="5" fill="#e1bee7" stroke="#6a1b9a" stroke-width="1"/>
    <text x="580" y="335" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#4a148c" text-anchor="middle">tts.py · ingest.py</text>

